version: '3'
services:
  flask-app:
    build: .
    container_name: flask-app
    expose:
      - 8888
    environment:
      - FLASK_ENV=production
    networks:
      - webnet

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt  # Mount SSL certs
    networks:
      - webnet

networks:
  webnet:
    driver: bridge


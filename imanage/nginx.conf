events {}
http {
    server {
        listen 443 ssl;
        server_name yeaft.com imanage.yeaft.com;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/yeaft.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Docker internal DNS resolver for dynamic upstream resolution
        resolver 127.0.0.11 valid=30s ipv6=off;

        # Proxy requests to Flask app
        location / {
            # Use variable for dynamic upstream resolution
            # This allows nginx to start even if flask-app is not ready
            set $upstream_flask flask-app:8888;
            proxy_pass http://$upstream_flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}


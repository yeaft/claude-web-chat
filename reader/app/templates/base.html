<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/css/bootstrap.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>{% block title %}Reading App{% endblock %}</title>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <a class="navbar-brand" href="{{ url_for('main.index') }}">开卷有益</a>
        <div class="ml-auto d-flex align-items-center">
            <!-- Theme Selector -->
            <form class="form-inline mr-3 d-flex align-items-center">
                <label class="mr-2 mb-0">主题：</label>
                <select id="theme-selector" class="form-control">
                    <option value="theme-light-gray">浅灰</option>
                    <option value="theme-light-yellow">淡黄</option>
                    <option value="theme-light-green">淡绿</option>
                    <option value="theme-dark">Dark</option>
                </select>
            </form>
            <!-- Copilot Button -->
            <button id="toggle-chat-btn" class="btn btn-outline-secondary ml-2">
                <!-- Chat Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-chat-right-dots" viewBox="0 0 16 16">
                  <path d="M14 1a1 1 0 0 1 1 1v11.793l-2-2V2a1 1 0 0 1 1-1h1zM2.854 12.146A.5.5 0 0 1 2.5 12V2a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v8.793l-2-2V2H3v9.5a.5.5 0 0 1-.146.354l-1 1a.5.5 0 0 1-.707 0l-1-1a.5.5 0 0 1 0-.707l1-1z"/>
                  <path d="M3 4.5a.5.5 0 1 1 1 0 .5.5 0 0 1-1 0zm0 2a.5.5 0 1 1 1 0 .5.5 0 0 1-1 0zm0 2a.5.5 0 1 1 1 0 .5.5 0 0 1-1 0z"/>
                </svg>
            </button>
            <!-- Login/Register Buttons -->
            {% if current_user.is_authenticated %}
            <span class="navbar-text mr-3">欢迎, {{ current_user.email }}</span>
            <a href="{{ url_for('main.logout') }}" class="btn btn-outline-secondary mr-2">登出</a>
            {% else %}
            <a href="{{ url_for('main.login') }}" class="btn btn-outline-primary mr-2">登录</a>
            <a href="{{ url_for('main.register') }}" class="btn btn-primary">注册</a>
            {% endif %}
        </div>
    </nav>
    <!-- Main Content -->
    <div id="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Chat Container -->
    <div id="chat-container" class="chat-container">
        <!-- Chat Messages -->
        <div id="chat-messages" class="chat-messages"></div>
        <!-- Input Form -->
        <form id="chat-form">
            <textarea id="chat-input" placeholder="输入你的问题..."></textarea>
            <div class="chat-controls">
                <!-- Clear Button -->
                <button type="button" id="clear-chat-btn" class="btn-clear" title="清除">
                    <!-- Broom Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-broom" viewBox="0 0 16 16">
                      <path d="M15.73 1.01a.5.5 0 0 1 .215.66l-6 13a.5.5 0 0 1-.927-.374l2.185-4.73L5.343 7.05l-2.12 2.122a.5.5 0 1 1-.707-.708l2.122-2.121-2.477-5.365a.5.5 0 0 1 .858-.514l3.228 6.976 5.862-2.546 2.662-5.777a.5.5 0 0 1 .66-.215z"/>
                    </svg>
                </button>
                <!-- Send Button -->
                <button type="submit" class="btn-send" title="发送">
                    <!-- Up Arrow Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-arrow-up-circle" viewBox="0 0 16 16">
                      <path fill-rule="evenodd" d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM8 4a.5.5 0 0 1 .5.5v6.293l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.498.498 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L7.5 10.793V4.5A.5.5 0 0 1 8 4z"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>

    {% block scripts %}
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const themeSelector = document.getElementById('theme-selector');
            const themes = ['theme-light-gray', 'theme-light-yellow', 'theme-light-green', 'theme-dark'];
            // Get current theme
            const currentTheme = localStorage.getItem('theme') || 'theme-light-gray';
            // Set initial theme
            document.body.classList.add(currentTheme);
            themeSelector.value = currentTheme;
            // Listen to theme selector changes
            themeSelector.addEventListener('change', function () {
                // Remove all theme classes
                themes.forEach(theme => document.body.classList.remove(theme));
                const selectedTheme = this.value;
                document.body.classList.add(selectedTheme);
                localStorage.setItem('theme', selectedTheme);
            });

            // Chat functionality
            var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            var toggleChatBtn = document.getElementById('toggle-chat-btn');
            var chatContainer = document.getElementById('chat-container');
            var mainContent = document.getElementById('main-content');
            var contentSection = document.getElementById('content-section');

            // Function to adjust heights dynamically
            function adjustHeights() {
                var windowHeight = window.innerHeight;
                var navHeight = document.querySelector('.navbar').offsetHeight;
                var footerHeight = document.getElementById('footer') ? document.getElementById('footer').offsetHeight : 0;

                var contentHeight = windowHeight - navHeight - footerHeight;
                var chatHeight = windowHeight - navHeight;

                if (mainContent) {
                    mainContent.style.height = contentHeight + 'px';
                }

                if (contentSection) {
                    contentSection.style.height = contentHeight + 'px';
                }

                if (chatContainer) {
                    chatContainer.style.height = chatHeight + 'px';
                }

                // Adjust chat messages height
                var chatFormHeight = document.getElementById('chat-form').offsetHeight;
                var chatMessages = document.getElementById('chat-messages');
                if (chatMessages) {
                    chatMessages.style.height = (chatHeight - chatFormHeight) + 'px';
                }
            }

            // Call adjustHeights on load and resize
            adjustHeights();
            window.addEventListener('resize', adjustHeights);

            toggleChatBtn.addEventListener('click', function () {
                if (chatContainer.style.display === 'none' || chatContainer.style.display === '') {
                    chatContainer.style.display = 'block';
                    if (!isMobile) {
                        mainContent.classList.add('with-chat');
                    } else {
                        mainContent.style.display = 'none';
                    }
                } else {
                    chatContainer.style.display = 'none';
                    if (!isMobile) {
                        mainContent.classList.remove('with-chat');
                    } else {
                        mainContent.style.display = 'block';
                    }
                }
                adjustHeights();
            });

            // Handle chat form submission
            var chatForm = document.getElementById('chat-form');
            var chatInput = document.getElementById('chat-input');
            var chatMessages = document.getElementById('chat-messages');

            var messages = [];

            chatForm.addEventListener('submit', function (e) {
                e.preventDefault();
                var userMessage = chatInput.value.trim();
                if (userMessage === '') return;

                // Add user message to messages
                messages.push({'role': 'user', 'content': userMessage});

                // Display user message
                var userMessageDiv = document.createElement('div');
                userMessageDiv.className = 'message user-message';

                // User avatar
                var userAvatar = document.createElement('div');
                userAvatar.className = 'avatar';
                userAvatar.innerHTML = '<img src="/static/images/user-icon.png" alt="User">';
                userMessageDiv.appendChild(userAvatar);

                // Message content
                var userContent = document.createElement('div');
                userContent.className = 'content';
                userContent.textContent = userMessage;
                userMessageDiv.appendChild(userContent);

                chatMessages.appendChild(userMessageDiv);

                // Clear input
                chatInput.value = '';

                // Show loading animation
                var loadingDiv = document.createElement('div');
                loadingDiv.className = 'message assistant-message loading';

                // Assistant avatar
                var assistantAvatar = document.createElement('div');
                assistantAvatar.className = 'avatar';
                assistantAvatar.innerHTML = '<img src="/static/images/assistant-icon.png" alt="Assistant">';
                loadingDiv.appendChild(assistantAvatar);

                // Loading content
                var loadingContent = document.createElement('div');
                loadingContent.className = 'content';
                loadingContent.textContent = '...';
                loadingDiv.appendChild(loadingContent);

                chatMessages.appendChild(loadingDiv);

                // Scroll to bottom
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Send request to server
                fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        'messages': messages,
                        'stream': true
                    })
                })
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    // Read the stream
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let assistantMessageDiv = document.createElement('div');
                    assistantMessageDiv.className = 'message assistant-message';

                    // Assistant avatar
                    var assistantAvatar = document.createElement('div');
                    assistantAvatar.className = 'avatar';
                    assistantAvatar.innerHTML = '<img src="/static/images/assistant-icon.png" alt="Assistant">';
                    assistantMessageDiv.appendChild(assistantAvatar);

                    // Message content
                    var assistantContent = document.createElement('div');
                    assistantContent.className = 'content';
                    assistantMessageDiv.appendChild(assistantContent);

                    chatMessages.replaceChild(assistantMessageDiv, loadingDiv);

                    function read() {
                        reader.read().then(({ done, value }) => {
                            if (done) {
                                // Add assistant message to messages
                                messages.push({'role': 'assistant', 'content': assistantContent.textContent});

                                // Limit to last 20 messages (10 pairs)
                                if (messages.length > 20) {
                                    messages = messages.slice(-20);
                                }

                                return;
                            }
                            // Append the new text
                            const chunk = decoder.decode(value);
                            assistantContent.textContent += chunk;

                            // Scroll to bottom
                            chatMessages.scrollTop = chatMessages.scrollHeight;

                            // Read the next chunk
                            read();
                        });
                    }
                    read();
                })
                .catch(function (error) {
                    console.error('Error:', error);
                });
            });

            // Clear chat
            var clearChatBtn = document.getElementById('clear-chat-btn');
            clearChatBtn.addEventListener('click', function () {
                messages = [];
                chatMessages.innerHTML = '';
            });

            // Handle text selection
            document.addEventListener('mouseup', function (e) {
                var selectedText = window.getSelection().toString().trim();
                if (selectedText.length > 0) {
                    // Show prompt to ask question
                    if (confirm('要提问关于以下内容的问题吗？\n\n' + selectedText)) {
                        // Open chat box
                        if (chatContainer.style.display === 'none' || chatContainer.style.display === '') {
                            toggleChatBtn.click();
                        }

                        // Pre-fill chat input with selected text
                        chatInput.value = selectedText;
                        chatInput.focus();
                    }
                }
            });

            // Initial chat open if on the reading page
            {% if 'book' in request.endpoint %}
            if (!chatContainer.classList.contains('active')) {
                chatContainer.classList.add('active');
                if (!isMobile) {
                    mainContent.classList.add('with-chat');
                } else {
                    mainContent.style.display = 'none';
                }
                adjustHeights();
            }
            {% endif %}
        });
    </script>
    {% endblock %}
</body>
</html>

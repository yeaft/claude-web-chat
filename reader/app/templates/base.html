<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/css/bootstrap.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <title>{% block title %}Reading App{% endblock %}</title>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <a class="navbar-brand" href="{{ url_for('main.index') }}">读书</a>
        <div class="ml-auto d-flex align-items-center">
            <!-- Theme Selector -->
            <form class="form-inline mr-3 d-flex align-items-center">
                <select id="theme-selector" class="form-control no-border">
                    <option value="theme-light-gray">浅灰</option>
                    <option value="theme-light-yellow">淡黄</option>
                    <option value="theme-light-green">淡绿</option>
                    <option value="theme-dark">Dark</option>
                </select>
            </form>
            <!-- Copilot Button -->
            <button id="toggle-chat-btn" class="btn ml-2 no-border">
                <!-- Chat Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="30" height="30" class="bi bi-copilot" viewBox="0 0 48 48">
                    <path fill="#616161" d="M30.7,7.27L28.33,9.1c-1.605-2.067-4.068-3.209-6.697-3.092C17.313,6.2,14,9.953,14,14.277l0,9.143	l10.5,6.12l-1,1.72l-11.706-6.827C11.302,24.146,11,23.62,11,23.051l0-8.687C11,8.1,16.129,2.79,22.39,3.007	C25.669,3.12,28.68,4.663,30.7,7.27z"></path><path fill="#616161" d="M12.861,9.833l0.4,2.967c-2.592,0.357-4.813,1.919-6.026,4.254c-1.994,3.837-0.4,8.582,3.345,10.745	l7.918,4.571l10.55-6.033l0.99,1.726l-11.765,6.724c-0.494,0.282-1.101,0.281-1.594-0.003l-7.523-4.343	C3.73,27.308,1.696,20.211,5.014,14.898C6.752,12.114,9.594,10.279,12.861,9.833z"></path><path fill="#616161" d="M6.161,26.563l2.77,1.137c-0.987,2.423-0.745,5.128,0.671,7.346	c2.326,3.645,7.233,4.638,10.977,2.476l7.918-4.572l0.05-12.153l1.99,0.006l-0.059,13.551c-0.002,0.569-0.307,1.094-0.8,1.379	l-7.523,4.343c-5.425,3.132-12.588,1.345-15.531-4.185C5.083,32.994,4.914,29.616,6.161,26.563z"></path><path fill="#616161" d="M17.3,40.73l2.37-1.83c1.605,2.067,4.068,3.209,6.697,3.092C30.687,41.8,34,38.047,34,33.723l0-9.143	l-10.5-6.12l1-1.72l11.706,6.827C36.698,23.854,37,24.38,37,24.949l0,8.687c0,6.264-5.13,11.574-11.39,11.358	C22.331,44.88,19.32,43.337,17.3,40.73z"></path><path fill="#616161" d="M35.139,38.167l-0.4-2.967c2.592-0.357,4.813-1.919,6.026-4.254c1.994-3.837,0.4-8.582-3.345-10.745	l-7.918-4.571l-10.55,6.033l-0.99-1.726l11.765-6.724c0.494-0.282,1.101-0.281,1.594,0.003l7.523,4.343	c5.425,3.132,7.459,10.229,4.141,15.543C41.248,35.886,38.406,37.721,35.139,38.167z"></path><path fill="#616161" d="M41.839,21.437l-2.77-1.137c0.987-2.423,0.745-5.128-0.671-7.346	c-2.326-3.645-7.233-4.638-10.977-2.476l-7.918,4.572l-0.05,12.153l-1.99-0.006l0.059-13.551c0.002-0.569,0.307-1.094,0.8-1.379	l7.523-4.343c5.425-3.132,12.588-1.345,15.531,4.185C42.917,15.006,43.086,18.384,41.839,21.437z"></path>
                </svg>
            </button>
            <!-- Login/Register Buttons -->
            {% if current_user.is_authenticated %}
            <span class="navbar-text mr-3">{{ current_user.email.split('@')[0] }}</span>
            <a href="{{ url_for('main.logout') }}" class="btn btn-outline-secondary mr-2 no-border">登出</a>
            {% else %}
            <a href="{{ url_for('main.login') }}" class="btn btn-outline-primary mr-2 no-border">登录</a>
            <a href="{{ url_for('main.register') }}" class="btn btn-outline-primary no-border">注册</a>
            {% endif %}
        </div>
    </nav>
    <!-- Main Content -->
    <div id="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- Chat Container -->
    <div id="chat-container" class="chat-container">
        <!-- Chat Messages -->
        <div id="chat-messages" class="chat-messages"></div>
        <!-- Input Form -->
        <form id="chat-form">
            <textarea id="chat-input" placeholder="输入你的问题..."></textarea>
            <div class="chat-controls">
                <!-- Clear Button -->
                <button type="button" id="clear-chat-btn" class="btn-clear" title="清空对话">
                    <!-- X Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-x-circle" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                    </svg>
                </button>
                <!-- Send Button -->
                <button type="submit" class="btn-send" title="发送">
                    <!-- Up Arrow Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="bi bi-send">
                        <path d="M22 12L3 3a1 1 0 0 0-1.3 1.3L11 12 1.7 19.7a1 1 0 0 0 1.3 1.3L22 12z"/>
                        <path d="M20 12L5.5 5.5L11 12 5.5 18.5L20 12z"/>
                      </svg>
                    <!-- <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-arrow-up-circle" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM8 12a.5.5 0 0 1-.5-.5V5.707L5.354 8.854a.5.5 0 1 1-.708-.708l3-3a.498.498 0 0 1 .708 0l3 3a.5.5 0 1 1-.708.708L8.5 5.707V11.5a.5.5 0 0 1-.5.5z"/>
                      </svg> -->
                </button>
            </div>
        </form>
    </div>

    {% block scripts %}
    <!-- Necessary Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Your Custom Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const themeSelector = document.getElementById('theme-selector');
            const themes = ['theme-light-gray', 'theme-light-yellow', 'theme-light-green', 'theme-dark'];
            // Get current theme
            const currentTheme = localStorage.getItem('theme') || 'theme-light-gray';
            // Set initial theme
            document.body.classList.add(currentTheme);
            themeSelector.value = currentTheme;
            // Listen for theme selector changes
            themeSelector.addEventListener('change', function () {
                // Remove all theme classes
                themes.forEach(theme => document.body.classList.remove(theme));
                const selectedTheme = this.value;
                document.body.classList.add(selectedTheme);
                localStorage.setItem('theme', selectedTheme);
            });

            // Chat functionality
            var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            var toggleChatBtn = document.getElementById('toggle-chat-btn');
            var chatContainer = document.getElementById('chat-container');
            var mainContent = document.getElementById('main-content');
            var contentSection = document.getElementById('content-section');

            function adjustHeights() {
                var windowHeight = window.innerHeight;
                var navHeight = document.querySelector('.navbar').offsetHeight;
                var footerHeight = document.getElementById('footer') ? document.getElementById('footer').offsetHeight : 0;

                var contentHeight = windowHeight - navHeight - footerHeight;
                var chatHeight = windowHeight - navHeight;

                if (mainContent) {
                    if (isMobile) {
                        mainContent.style.height = chatHeight + 'px';
                    } else {
                        mainContent.style.height = chatHeight + 'px';
                    }
                }

                if (contentSection) {
                    contentSection.style.height = contentHeight + 'px';
                }

                if (chatContainer) {
                    chatContainer.style.height = chatHeight + 'px';
                }

                // Adjust chat messages height
                var chatFormHeight = document.getElementById('chat-form').offsetHeight;
                var chatMessages = document.getElementById('chat-messages');
                if (chatMessages) {
                    chatMessages.style.height = (chatHeight - chatFormHeight) + 'px';
                }
            }

            // On page load and resize
            adjustHeights();
            window.addEventListener('resize', adjustHeights);

            toggleChatBtn.addEventListener('click', function () {
                if (chatContainer.classList.contains('active')) {
                    chatContainer.classList.remove('active');
                    if (!isMobile) {
                        mainContent.classList.remove('with-chat');
                    } else {
                        mainContent.style.display = 'block';
                    }
                } else {
                    chatContainer.classList.add('active');
                    if (!isMobile) {
                        mainContent.classList.add('with-chat');
                    } else {
                        mainContent.style.display = 'none';
                    }
                }
                adjustHeights();
            });

            // Define global variables
            var chatForm = document.getElementById('chat-form');
            var chatInput = document.getElementById('chat-input');
            var chatMessages = document.getElementById('chat-messages');

            var messages = [];

            // Function to send message to server
            function sendMessageToServer(messagesToSend) {
                // Show loading animation
                var loadingDiv = document.createElement('div');
                loadingDiv.className = 'message assistant-message loading';

                // Loading content
                var loadingContent = document.createElement('div');
                loadingContent.className = 'content';
                loadingContent.innerHTML = '正在思考<span class="loading-dots"><span></span><span></span><span></span></span>';
                loadingDiv.appendChild(loadingContent);

                chatMessages.appendChild(loadingDiv);

                // Scroll to bottom
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Send request to server
                fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        'messages': messagesToSend,
                        'stream': true
                    })
                })
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    // Read stream
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let assistantMessageDiv = document.createElement('div');
                    assistantMessageDiv.className = 'message assistant-message';

                    // Message content
                    var assistantContent = document.createElement('div');
                    assistantContent.className = 'content';
                    assistantMessageDiv.appendChild(assistantContent);

                    chatMessages.replaceChild(assistantMessageDiv, loadingDiv);

                    let accumulatedContent = '';

                    function read() {
                        reader.read().then(({ done, value }) => {
                            if (done) {
                                // Remove loading animation if any
                                assistantContent.querySelector('.loading-dots')?.remove();

                                // Check if content is empty
                                if (accumulatedContent.trim() === '') {
                                    assistantContent.textContent = '抱歉，我无法获取回答，请重试。';
                                } else {
                                    // Add assistant message to messages array
                                    messages.push({ 'role': 'assistant', 'content': accumulatedContent });

                                    // Limit messages to last 20
                                    if (messages.length > 20) {
                                        messages = messages.slice(-20);
                                    }
                                }
                                return;
                            }
                            // Append new text
                            const chunk = decoder.decode(value, { stream: true });
                            accumulatedContent += chunk;

                            // Render Markdown
                            assistantContent.innerHTML = marked.parse(accumulatedContent);

                            // Scroll to bottom
                            chatMessages.scrollTop = chatMessages.scrollHeight;

                            // Read next chunk
                            read();
                        }).catch(error => {
                            // Remove loading animation
                            assistantContent.querySelector('.loading-dots')?.remove();

                            // Display error message
                            assistantContent.textContent = '发生错误，请重试。';
                            console.error('Error reading stream:', error);
                        });
                    }
                    read();
                })
                .catch(function (error) {
                    // Remove loading animation
                    loadingDiv.remove();

                    // Display error message
                    var errorMessageDiv = document.createElement('div');
                    errorMessageDiv.className = 'message assistant-message';
                    var errorContent = document.createElement('div');
                    errorContent.className = 'content';
                    errorContent.textContent = '发生错误，请重试。';
                    errorMessageDiv.appendChild(errorContent);
                    chatMessages.appendChild(errorMessageDiv);

                    console.error('Error:', error);
                });
            }

            // Handle chat form submission
            chatForm.addEventListener('submit', function (e) {
                e.preventDefault();
                var userMessage = chatInput.value.trim();
                if (userMessage === '') return;

                // Add user message to messages array
                messages.push({'role': 'user', 'content': userMessage});

                // Display user message
                var userMessageDiv = document.createElement('div');
                userMessageDiv.className = 'message user-message';

                var userContent = document.createElement('div');
                userContent.className = 'content';
                userContent.textContent = userMessage;
                userMessageDiv.appendChild(userContent);

                chatMessages.appendChild(userMessageDiv);

                // Clear input field
                chatInput.value = '';

                // Scroll to bottom
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Send message to server
                sendMessageToServer(messages);
            });

            // Clear chat history
            var clearChatBtn = document.getElementById('clear-chat-btn');
            clearChatBtn.addEventListener('click', function () {
                messages = [];
                chatMessages.innerHTML = '';
            });

            // Define a variable to track if the prompt was just created
            var justCreatedPrompt = false;

            // Handle text selection
            document.addEventListener('mouseup', function (e) {
                var selectedText = window.getSelection().toString().trim();

                // First, handle prompt closure
                var existingPrompt = document.querySelector('.selection-prompt');
                if (existingPrompt && !existingPrompt.contains(e.target)) {
                    existingPrompt.parentNode.removeChild(existingPrompt);
                }

                if (selectedText.length > 0) {
                    // Create prompt
                    var selection = window.getSelection();
                    var range = selection.getRangeAt(0);
                    var rect = range.getBoundingClientRect();

                    var promptDiv = document.createElement('div');
                    promptDiv.className = 'selection-prompt';

                    // Buttons
                    var btnTranslate = document.createElement('button');
                    btnTranslate.textContent = '翻译';

                    var btnAnalyze = document.createElement('button');
                    btnAnalyze.textContent = '解析';

                    var btnReturn = document.createElement('button');
                    btnReturn.textContent = '返回';

                    promptDiv.appendChild(btnTranslate);
                    promptDiv.appendChild(btnAnalyze);
                    promptDiv.appendChild(btnReturn);

                    document.body.appendChild(promptDiv);

                    // Calculate prompt position
                    promptDiv.style.top = (rect.bottom + window.scrollY + 5) + 'px';
                    promptDiv.style.left = (rect.left + window.scrollX) + 'px';

                    // Mark prompt as just created
                    justCreatedPrompt = true;

                    // Handle button clicks
                    btnReturn.addEventListener('click', function (event) {
                        event.stopPropagation();
                        if (promptDiv && document.body.contains(promptDiv)) {
                            promptDiv.parentNode.removeChild(promptDiv);
                        }
                        window.getSelection().removeAllRanges();
                    });

                    btnTranslate.addEventListener('click', function (event) {
                        event.stopPropagation();
                        if (promptDiv && document.body.contains(promptDiv)) {
                            promptDiv.parentNode.removeChild(promptDiv);
                        }
                        window.getSelection().removeAllRanges();
                        handleSelectionAction('translate', selectedText);
                    });

                    btnAnalyze.addEventListener('click', function (event) {
                        event.stopPropagation();
                        if (promptDiv && document.body.contains(promptDiv)) {
                            promptDiv.parentNode.removeChild(promptDiv);
                        }
                        window.getSelection().removeAllRanges();
                        handleSelectionAction('analyze', selectedText);
                    });
                } else {
                    justCreatedPrompt = false;
                }
            });

            // Close prompt when clicking elsewhere
            document.addEventListener('mousedown', function (e) {
                var promptDiv = document.querySelector('.selection-prompt');
                if (promptDiv && !promptDiv.contains(e.target) && !justCreatedPrompt) {
                    promptDiv.parentNode.removeChild(promptDiv);
                }
                // Reset flag
                justCreatedPrompt = false;
            });

            // Define handleSelectionAction function
            function handleSelectionAction(action, selectedText) {
                // Open chat window if not open
                if (!chatContainer.classList.contains('active')) {
                    toggleChatBtn.click();
                }

                // Adjust heights
                adjustHeights();

                // Clear messages
                messages = [];
                chatMessages.innerHTML = '';

                // Add system message
                messages.push({
                    'role': 'system',
                    'content': '你是一个精通国学儒释道中医的的国学大师，你会尽可能的准确帮助用户翻译文章，内容分析和解析，或者回答用户相关的提问。'
                });

                // Add user message
                var userMessageContent = '';
                if (action === 'translate') {
                    userMessageContent = `请你帮助翻译成白话文，如果有生僻字请在后面加上拼音和声调，如果有难以理解的词，再给一些简单解释：${selectedText}`;
                } else if (action === 'analyze') {
                    userMessageContent = `请你对于下面的内容，进行分析解构并给出你的看法，如果有生僻字请在后面加上拼音和声调。内容：${selectedText}`;
                }

                messages.push({
                    'role': 'user',
                    'content': userMessageContent
                });

                // Display user message
                var userMessageDiv = document.createElement('div');
                userMessageDiv.className = 'message user-message';

                var userContent = document.createElement('div');
                userContent.className = 'content';
                userContent.textContent = userMessageContent;
                userMessageDiv.appendChild(userContent);

                chatMessages.appendChild(userMessageDiv);

                // Scroll to bottom
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Send message to server
                sendMessageToServer(messages);
            }

            // If on reading page, initially open chat window
            {% if 'book' in request.endpoint %}
            if (!isMobile) {
                if (!chatContainer.classList.contains('active')) {
                    toggleChatBtn.click();
                    adjustHeights();
                }
            }
            {% endif %}
        });
    </script>
    {% endblock %}
</body>
</html>

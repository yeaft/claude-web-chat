events {
    worker_connections 1024;
}

http {
    # Docker DNS resolver - allows nginx to start even if some upstreams are down
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # WebSocket connection upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 443 ssl;
        server_name imanage.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            set $upstream_imanage imanage-flask-app:8888;
            proxy_pass http://$upstream_imanage;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name reader.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            set $upstream_reader reader-app:5123;
            proxy_pass http://$upstream_reader;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_cache off;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }
    }

    server {
        listen 443 ssl;
        server_name www.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            set $upstream_dataapi data-api-flask-app:8080;
            proxy_pass http://$upstream_dataapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # =========================================================================
    # AI-Writor (qvn.yeaft.com) - App has its own authentication (JWT + MFA)
    # =========================================================================
    server {
        listen 443 ssl;
        server_name qvn.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Client body size (for file uploads)
        client_max_body_size 50M;

        # Frontend (Vue SPA) - use variable to allow nginx start without upstream
        location / {
            set $frontend_upstream ai-writor-frontend:9000;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API - use variable to allow nginx start without upstream
        location /api {
            set $backend_upstream ai-writor-backend:5000;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # WebSocket for Socket.IO - use variable to allow nginx start without upstream
        location /socket.io {
            set $backend_upstream ai-writor-backend:5000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket specific settings
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Health check - use variable
        location = /health {
            set $backend_upstream ai-writor-backend:5000;
            proxy_pass http://$backend_upstream/api/health;
        }
    }

    # =========================================================================
    # Claude Web Chat (cc.yeaft.com) - App has its own authentication
    # =========================================================================
    server {
        listen 443 ssl;
        server_name cc.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Client body size (for file uploads)
        client_max_body_size 50M;

        # All requests (including WebSocket)
        location / {
            set $upstream_webchat claude-webchat:3456;
            proxy_pass http://$upstream_webchat;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket specific settings
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
        }
    }

    # =========================================================================
    # Copilot Proxy Server (copilot.yeaft.com) - API key auth in app layer
    # =========================================================================
    server {
        listen 443 ssl;
        server_name copilot.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Allow large request bodies for long conversations
        client_max_body_size 50M;

        location / {
            set $upstream_copilot copilot-proxy:6628;
            proxy_pass http://$upstream_copilot;
            proxy_http_version 1.1;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            # Long timeouts for LLM responses
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }
}

events {
    worker_connections 1024;
}

http {
    # Lua shared dictionaries for IP blacklist (only used by chat.yeaft.com)
    lua_shared_dict failed_attempts 1m;
    lua_shared_dict blacklist 1m;
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # WebSocket connection upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 443 ssl;
        server_name imanage.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://imanage-flask-app:8888;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name reader.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://reader-app:5123;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_cache off;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }
    }

    server {
        listen 443 ssl;
        server_name www.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://data-api-flask-app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # =========================================================================
    # AI-Writor (qvn.yeaft.com) - with Session-based Auth + IP Blacklist
    # =========================================================================
    server {
        listen 443 ssl;
        server_name qvn.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Full authentication in Lua (session cookie + Basic Auth fallback)
        access_by_lua_block {
            local ip_blacklist = require "ip_blacklist"
            local session_auth = require "session_auth"

            -- Check IP blacklist first
            if ip_blacklist.is_blacklisted() then
                ngx.log(ngx.WARN, "Blocked blacklisted IP: " .. ngx.var.remote_addr)
                ngx.exit(ngx.HTTP_FORBIDDEN)
                return
            end

            -- Authenticate: session cookie first, then Basic Auth
            session_auth.authenticate()
        }

        # Set session cookie after successful auth
        header_filter_by_lua_block {
            local session_auth = require "session_auth"
            session_auth.set_session_cookie()
        }

        # Log auth result for blacklist tracking
        log_by_lua_block {
            local ip_blacklist = require "ip_blacklist"
            ip_blacklist.log_auth_result()
        }

        # Client body size (for file uploads)
        client_max_body_size 50M;

        # Frontend (Vue SPA)
        location / {
            proxy_pass http://ai-writor-frontend:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api {
            proxy_pass http://ai-writor-backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # WebSocket for Socket.IO
        location /socket.io {
            proxy_pass http://ai-writor-backend:5000;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket specific settings
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Health check
        location = /health {
            proxy_pass http://ai-writor-backend:5000/api/health;
        }
    }

    # =========================================================================
    # Claude Web Chat (cc.yeaft.com) - with IP Blacklist protection
    # =========================================================================
    server {
        listen 443 ssl;
        server_name cc.yeaft.com;

        ssl_certificate /etc/letsencrypt/live/yeaft.com-0002/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yeaft.com-0002/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Claude Web Chat has its own authentication, no nginx auth needed
        # But we still use IP blacklist for protection
        access_by_lua_block {
            local ip_blacklist = require "ip_blacklist"
            if ip_blacklist.is_blacklisted() then
                ngx.log(ngx.WARN, "Blocked blacklisted IP: " .. ngx.var.remote_addr)
                ngx.exit(ngx.HTTP_FORBIDDEN)
                return
            end
        }

        # Client body size (for file uploads)
        client_max_body_size 50M;

        # Static files and API
        location / {
            proxy_pass http://claude-webchat:3456;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket for real-time communication
        location /ws {
            proxy_pass http://claude-webchat:3456;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket specific settings
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
        }
    }
}

version: '3'
services:
  nginx:
    image: openresty/openresty:alpine
    container_name: nginx_for_servers
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./lua:/etc/nginx/lua:ro  # Lua scripts for IP blacklist
      - ./ip_blacklist.json:/etc/nginx/ip_blacklist.json  # Persistent blacklist
      - /etc/letsencrypt:/etc/letsencrypt  # Mount SSL certificates
      - ./htpasswd:/etc/nginx/.htpasswd:ro  # Basic Auth for ai-writor
    depends_on:
      - imanage-flask-app
      - data-api-flask-app
    networks:
      - webnet

  imanage-flask-app:
    build:
      context: ./imanage
      dockerfile: Dockerfile
    container_name: imanage-flask-app
    expose:
      - "8888"
    environment:
      - FLASK_ENV=production
    networks:
      - webnet

  data-api-flask-app:
    build:
      context: ./
      dockerfile: ServerDockerFile
    container_name: data-api-flask-app
    expose:
      - "8080"
    environment:
      - FLASK_ENV=production
      - MONGODB_HOST=host.docker.internal
    networks:
      - webnet
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  reader-app:
    build:
      context: ./reader
      dockerfile: Dockerfile
    container_name: reader-app
    expose:
      - "5123"
    environment:
      - FLASK_ENV=production
      - MONGODB_HOST=host.docker.internal
    networks:
      - webnet
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

networks:
  webnet:
    driver: bridge

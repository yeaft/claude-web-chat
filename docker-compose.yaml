version: '3'
services:
  nginx:
    image: nginx:latest
    container_name: nginx_for_servers
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt  # Mount SSL certificates
    depends_on:
      - imanage-flask-app
      - data-api-flask-app
    networks:
      - webnet

  imanage-flask-app:
    build:
      context: ./imanage
      dockerfile: Dockerfile
    container_name: imanage-flask-app
    expose:
      - "8888"
    environment:
      - FLASK_ENV=production
    networks:
      - webnet

  data-api-flask-app:
    build:
      context: ./
      dockerfile: ServerDockerFile
    container_name: data-api-flask-app
    expose:
      - "8080"
    environment:
      - FLASK_ENV=production
    network_mode: host

networks:
  webnet:
    driver: bridge

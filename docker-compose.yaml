version: '3'
services:
  nginx:
    image: openresty/openresty:alpine
    container_name: nginx_for_servers
    ports:
      - "443:443"
    volumes:
      # OpenResty uses different paths than standard nginx
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
      - ./lua:/usr/local/openresty/nginx/lua:ro  # Lua scripts for IP blacklist
      - ./ip_blacklist.json:/usr/local/openresty/nginx/ip_blacklist.json  # Persistent blacklist
      - /etc/letsencrypt:/etc/letsencrypt  # Mount SSL certificates
      - ./htpasswd:/etc/nginx/.htpasswd:ro  # Basic Auth for ai-writor
    depends_on:
      - imanage-flask-app
      - data-api-flask-app
      - claude-webchat
    networks:
      - webnet

  imanage-flask-app:
    build:
      context: ./imanage
      dockerfile: Dockerfile
    container_name: imanage-flask-app
    expose:
      - "8888"
    environment:
      - FLASK_ENV=production
    networks:
      - webnet

  data-api-flask-app:
    build:
      context: ./
      dockerfile: ServerDockerFile
    container_name: data-api-flask-app
    expose:
      - "8080"
    environment:
      - FLASK_ENV=production
      - MONGODB_HOST=host.docker.internal
    networks:
      - webnet
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  reader-app:
    build:
      context: ./reader
      dockerfile: Dockerfile
    container_name: reader-app
    expose:
      - "5123"
    environment:
      - FLASK_ENV=production
      - MONGODB_HOST=host.docker.internal
    networks:
      - webnet
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  # =========================================
  # AI-Writor Services
  # =========================================
  ai-writor-backend:
    build:
      context: ../ai-writor/backend
      dockerfile: Dockerfile
    container_name: ai-writor-backend
    expose:
      - "5000"
    env_file:
      - ../ai-writor/backend/.env
    environment:
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/chat.db
    volumes:
      - ../ai-writor/backend/data:/app/data
      - ../ai-writor/backend/uploads:/app/uploads
    networks:
      - webnet
    restart: unless-stopped

  ai-writor-frontend:
    build:
      context: ../ai-writor/frontend
      dockerfile: Dockerfile
    container_name: ai-writor-frontend
    expose:
      - "9000"
    networks:
      - webnet
    restart: unless-stopped

  # =========================================
  # Claude Web Chat Services (cc.yeaft.com)
  # =========================================
  claude-webchat:
    build:
      context: ../WebChat
      dockerfile: Dockerfile
    container_name: claude-webchat
    expose:
      - "3456"
    env_file:
      - ../WebChat/server/.env
    environment:
      - NODE_ENV=production
      - PORT=3456
      - SKIP_AUTH=false
    volumes:
      - ../WebChat/data:/app/data
    networks:
      - webnet
    restart: unless-stopped

networks:
  webnet:
    driver: bridge

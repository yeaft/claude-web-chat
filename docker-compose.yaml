version: '3'
services:
  nginx:
    image: nginx:alpine
    container_name: nginx_for_servers
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - imanage-flask-app
      - data-api-flask-app
      - claude-webchat
    networks:
      - webnet

  imanage-flask-app:
    build:
      context: ./imanage
      dockerfile: Dockerfile
    container_name: imanage-flask-app
    expose:
      - "8888"
    environment:
      - FLASK_ENV=production
    networks:
      - webnet

  data-api-flask-app:
    build:
      context: ./
      dockerfile: ServerDockerFile
    container_name: data-api-flask-app
    expose:
      - "8080"
    environment:
      - FLASK_ENV=production
      - MONGODB_HOST=host.docker.internal
    networks:
      - webnet
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  reader-app:
    build:
      context: ./reader
      dockerfile: Dockerfile
    container_name: reader-app
    expose:
      - "5123"
    environment:
      - FLASK_ENV=production
      - MONGODB_HOST=host.docker.internal
    networks:
      - webnet
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  # =========================================
  # AI-Writor Services
  # =========================================
  ai-writor-backend:
    build:
      context: ../ai-writor/backend
      dockerfile: Dockerfile
    container_name: ai-writor-backend
    expose:
      - "5000"
    env_file:
      - ../ai-writor/backend/.env
    environment:
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/chat.db
    volumes:
      - ../ai-writor/backend/data:/app/data
      - ../ai-writor/backend/uploads:/app/uploads
    networks:
      - webnet
    restart: unless-stopped

  ai-writor-frontend:
    build:
      context: ../ai-writor/frontend
      dockerfile: Dockerfile
    container_name: ai-writor-frontend
    expose:
      - "9000"
    networks:
      - webnet
    restart: unless-stopped

  # =========================================
  # Claude Web Chat Services (cc.yeaft.com)
  # =========================================
  claude-webchat:
    image: ghcr.io/yeaft/claude-web-chat:latest
    container_name: claude-webchat
    expose:
      - "3456"
    env_file:
      - ${HOME}/data/webchat/.env
    environment:
      - NODE_ENV=production
    volumes:
      - ${HOME}/data/webchat:/app/data
    networks:
      - webnet
    restart: unless-stopped

  # =========================================
  # Copilot Proxy Server (copilot.yeaft.com)
  # =========================================
  copilot-proxy:
    build:
      context: ../CopilotProxyServer
      dockerfile: Dockerfile
    container_name: copilot-proxy
    expose:
      - "6628"
    env_file:
      - ${HOME}/data/copilot-proxy/.env
    environment:
      - NODE_ENV=production
      - PORT=6628
      - DATA_DIR=/app/data
    volumes:
      - ${HOME}/data/copilot-proxy:/app/data
    networks:
      - webnet
    restart: unless-stopped

networks:
  webnet:
    driver: bridge

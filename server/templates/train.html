<!DOCTYPE html>
<html>
<head>
    <title>Good luck</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        h3 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 3px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr.even {
            background-color: #f9f9f9;
        }

        tr.odd {
            background-color: #FFF; /* Or any color you prefer for odd rows */
        }
        .header-container {
            display: flex;
            align-items: center; /* This will vertically center align the h3 and p */
            justify-content: start;
            flex-wrap: wrap;
        }

        .chart-container {
            margin-left: auto;
            margin-right: auto;
            height: 800px; /* Default height, adjust as needed */
            min-width: 310px; /* Minimum width */
            max-width: 1250px; /* Maximum width */
        }

        .header-container h3 {
            margin-right: 10px; /* Add some spacing between the h3 and p */
        }
        
        /* Styles to ensure that the p tag doesn't take the full width and stays inline */
        .header-container p {
            margin: 0;
            flex-grow: 1;
            white-space: nowrap;
        }
        #ticksContainers table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        #ticksContainers th, 
        #ticksContainers td {
            border: 1px solid #ddd;
            padding: 3px;
            text-align: left;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .test-button {
            background-color: #4CAF50; /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px; /* Rounded corners */
            transition: background-color 0.3s ease;
        }

        .control-button {
            border: none;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px; /* Rounded corners */
            transition: background-color 0.3s ease;
        }

        .long-button {
            background-color: #FF8A80;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px; /* Rounded corners */
            transition: background-color 0.3s ease;
        }

        .short-button {
            background-color: #81C784; 
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px; /* Rounded corners */
            transition: background-color 0.3s ease;
        }

        .test-button:hover {
            background-color: #45a049; /* Darker shade of green */
        }

    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.highcharts.com/stock/highstock.js"></script>
</head>
<body>

<!-- Containers for Combined Chart and Table for Each Type -->
<div id="combinedContainers">
    <!-- Dynamically generated chart and table containers will be placed here -->
</div>

<div id="codeButtons" class="button-container">
    <!-- Buttons will be dynamically added here -->
</div>


<div class="button-container">
    <button id="playButton" class="control-button">Play</button>
    <button id="pauseButton" class="control-button">Pause</button>
    <button id="randomButton" class="control-button">Random</button>
    <button id="past30Button" class="control-button">Past30</button>
    <button id="next30Button" class="control-button">Next30</button>
    <button id="normalButton" class="control-button">Normal</button>    
    <button id="speedUp5Button" class="control-button">Speed5</button>
    <button id="speedUp10Button" class="control-button">Speed10</button>
</div>

<script>
    Highcharts.setOptions({
        global: {
            timezoneOffset: -8 * 60  // Offset for UTC +8
        }
    });
    var charts = {};
    var count = 0;

    function createChartContainer(type) {
        var containerId = 'container_' + type;
        $('<div>').attr('id', containerId)
                  .addClass('chart-container') // Add the chart-container class
                  .appendTo('#chartContainer');
        return containerId;
    }

    function createChart(containerId, title) {
        var tooltipFontSize = isMobileDevice() ? '4vw' : '1.5vw';
        var labelFontSize = isMobileDevice() ? '3vw' : '1.2vw';
        var lineWidth = isMobileDevice() ? 4 : 2;
        return new Promise((resolve, reject) => {
            var chart = Highcharts.stockChart(containerId, {
                chart: {
                    zoomType: '',
                    events: {
                        load: function () {
                            resolve(this);
                        }
                    }
                },
                plotOptions: {
                    series: {
                        turboThreshold: 0
                    }
                },
                rangeSelector: {
                    buttons: [{
                        type: 'hour',
                        count: 3,
                        text: '3h'
                    },{
                        type: 'hour',
                        count: 12,
                        text: '12h'
                    },{
                        type: 'day',
                        count: 1,
                        text: '1d'
                    }, {
                        type: 'day',
                        count: 2,
                        text: '2d'
                    }, {
                        type: 'day',
                        count: 3,
                        text: '3d'
                    }, {
                        type: 'day',
                        count: 5,
                        text: '5d'
                    }, {
                        type: 'week',
                        count: 1,
                        text: '1w'
                    },{
                        type: 'all',
                        text: 'All'
                    }],
                    selected: 1, // This selects (highlights) the '6m' button by default
                    inputEnabled: false, // Enables the input boxes for manual date entry
                    buttonTheme: {
                        style: {
                            fontSize: labelFontSize // Set font size for the xAxis labels
                        }
                    },
                    buttonSpacing: 15
                },
                navigator: {
                    enabled: true
                },
                scrollbar: {
                    enabled: true
                },
                title: { text: title },
                xAxis: {
                    type: 'datetime',
                    tickInterval: 60000,
                    crosshair: {
                        color: 'black'
                    },
                    labels: {
                        style: {
                            fontSize: labelFontSize // Set font size for the xAxis labels
                        }
                    }
                },
                yAxis: [{
                    height: '60%',
                    labels: {
                        reserveSpace: true, 
                        style: {
                            fontSize: labelFontSize
                        }
                    },
                    resize: { enabled: true }
                }, {
                    top: '60%',
                    height: '40%',
                    crosshair: {
                        color: 'black'
                    },
                    labels: {
                        reserveSpace: true, 
                        style: {
                            fontSize: labelFontSize
                        }
                    },
                    offset: 0
                }, {
                    top: '60%',
                    height: '40%',
                    opposite: false,
                    labels: {
                        reserveSpace: true, 
                        style: {
                            fontSize: labelFontSize
                        }
                    }
                }],
                tooltip: {
                    shared: true,
                    split: false,
                    style: {
                        fontSize: tooltipFontSize // Set the font size for the tooltip
                    },
                    formatter: function () {
                        /* var utcOffset = 8 * 60 * 60 * 1000;
                        var adjustedTime = this.x + utcOffset; */
                        var tooltipText = Highcharts.dateFormat('%H:%M', this.x);
                        this.points.forEach(function (point) {
                            var value = point.y;
                            if (title === "I" && (point.series.name === 'Max ZXJ' || point.series.name === 'Min ZXJ')) {
                                value = roundToHalf(value);
                            } else {
                                value = Highcharts.numberFormat(value, 0);
                            }
                            tooltipText += '<br/><span style="color:' + point.series.color + '">●</span> ' + point.series.name + ': ' + value;
                        });
                        return tooltipText;
                    }
                },
                series: [{
                    name: 'Max ZXJ',
                    data: [],
                    type: 'line',
                    color: '#FF8A80',
                    lineWidth: lineWidth,
                    yAxis: 0,
                    dataGrouping: {
                        enabled: false
                    }
                }, {
                    name: 'Min ZXJ',
                    data: [],
                    type: 'line',
                    color: '#81C784',
                    lineWidth: lineWidth,
                    yAxis: 0,
                    dataGrouping: {
                        enabled: false
                    }
                }, {
                    name: 'CCL',
                    data: [],
                    type: 'line',
                    lineWidth: lineWidth,
                    yAxis: 1,
                    dataGrouping: {
                        enabled: false
                    }
                }, {
                    name: 'CJL',
                    data: [],
                    type: 'column',
                    lineWidth: lineWidth,
                    color: '#CE93D8',
                    yAxis: 2,
                    dataGrouping: {
                        enabled: false
                    }
                }]
            });
        });
    }

    function roundToHalf(num) {
        return Math.round(num * 2) / 2;
    }

    function updateChartData(chart, typeData) {
        if (chart && chart.series && typeData && Array.isArray(typeData)) {
            chart.series[0].setData(typeData.map(d => [new Date(d.time).getTime(), d.max_zxj]));
            chart.series[1].setData(typeData.map(d => [new Date(d.time).getTime(), d.min_zxj]));
            chart.series[2].setData(typeData.map(d => [new Date(d.time).getTime(), d.ccl]));
            chart.series[3].setData(typeData.map(d => {
                var color = '#CE93D8'
                if (d.cjl > 10000) {
                    color = '#ca6e7c';
                } else if (d.cjl > 8500) {
                    color = '#d1818d';
                }
                return {
                    x: new Date(d.time).getTime(),
                    y: d.cjl,
                    color: color // Apply the chosen color
                };
            }));
        } else {
            console.error('Chart not initialized or invalid data for', typeData);
        }
    }


    function createCombinedContainer(type) {
        var combinedContainerId = 'combined_' + type;
        $('<div>').attr('id', combinedContainerId).appendTo('#combinedContainers');
        return combinedContainerId;
    }

    function createChartAndTable(type) {
        var combinedContainerId = createCombinedContainer(type);
        
        // Check if table container exists before creating
        var tableContainerId = 'table_' + type;
        if ($('#' + tableContainerId).length === 0) {
            $('<div>').attr('id', tableContainerId)
                .appendTo('#' + combinedContainerId);
        }

        var chartContainerId = 'chart_' + type;
        if ($('#' + chartContainerId).length === 0) {
            $('<div>').attr('id', chartContainerId)
                .addClass('chart-container') // Add the chart-container class
                .appendTo('#' + combinedContainerId);
        }

        return { tableContainerId, chartContainerId };
    }

    function addRowsFromArray(arr) {
        var tableHtml = "";
        var className = "";
        $.each(arr, function(index, row) {
            className = count % 2 == 0 ? "even" : "odd";
            tableHtml += '<tr class="' + className + '">';
            $.each(row, function(key, value) {
                tableHtml += '<td>' + value + '</td>';
            });
            count++;
            tableHtml += '</tr>';
        });
        return tableHtml
    }

    function renderTable(type, data) {
        var tableHtml = '<table>';        
        tableHtml += addRowsFromArray(data.ccl_sums);  
        tableHtml += addRowsFromArray(data.ticks);
        tableHtml += '</table>';
        $('#table_' + type).html(tableHtml);
    }


    function isMobileDevice() {
        return window.innerWidth <= 1080 && window.innerHeight > window.innerWidth; // or another threshold you prefer
    }

    function isBoldFont() {
        return window.innerWidth <= 1080;
    }

    function adjustTableFontSize() {
        var fontSize = isBoldFont() ? '4vw' : '1.3vw'; // Using the same isMobileDevice function

        // Apply the font size to th and td elements
        $('th, td').css('font-size', fontSize);
    }

    $(document).ready(function() {
        let isPlaying = true;
        let fetchInterval = 5000; // Default refresh rate of 5 seconds
        let intervalHandle = null;
        let next = 1;

        var codeCandidates = ["rb2401"]; // Add more codes as needed

        function createCodeButtons() {
            var container = $('#codeButtons');
            container.empty(); // Clear existing buttons if any
            $('<button>')
                    .addClass('long-button')
                    .text("Long") // Button text
                    .on('click', function() {
                        operate("long");
                    })
                    .appendTo(container);

            codeCandidates.forEach(function(code) {
                $('<button>')
                    .addClass('test-button')
                    .text(code.toUpperCase()) // Button text
                    .on('click', function() {
                        fetchData(code);
                    })
                    .appendTo(container);
            });

            $('<button>')
                .addClass('short-button')
                .text("Short") // Button text
                .on('click', function() {
                    operate("short");
                })
                .appendTo(container);
        }

        function operate(direction) {
            var url = `/train/operate?operation=${direction}`;
            $.getJSON(url, function(response) {
                console.log('Operate response:', response);
            });
        }

        function fetchData(code=null, random=null) {
            var url = `/train/data?next=${next}`;
            if (code) {
                url += `&code=${code}`; // Append code parameter to the URL if provided
            }

            if (random){
                url += `&random=${random}`;
            }
            $.getJSON(url, function(chartData) {
                // Handle data and update charts
                next = 1;
                var orderedKeys = ["rb", "i", "oi", "y", "hc"];
                $.each(orderedKeys, function(index, type) {
                    var data = chartData[type];
                    if (data) { 
                        if ($('#table_' + type).length === 0) {
                            createChartAndTable(type);
                        }
                        var scrollTop = $(window).scrollTop(); // Save current scroll position
                        renderTable(type, data); // Render the main table
                        adjustTableFontSize();
                        $(window).scrollTop(scrollTop); // Restore scroll position                        

                        ticks = data.chart_ticks;
                        if (!charts[type]) {
                        
                            var containers = createChartAndTable(type);
                            createChart(containers.chartContainerId, type.toUpperCase()).then(function(chart) {
                                charts[type] = chart;
                                updateChartData(chart, ticks);
                            }).catch(function(error) {
                                console.error('Error creating chart:', error);
                            });
                        } else {
                            updateChartData(charts[type], ticks);
                        }
                    } else {
                        // Remove the chart and table if no data is available
                        if ($('#table_' + type).length > 0) {
                            $('#table_' + type).remove();
                        }
                        if ($('#chart_' + type).length > 0) {
                            $('#chart_' + type).remove();
                        }
                    }
                });
            });
        }
        createCodeButtons();
        fetchData();

        function manageDataFetching() {
            if (isPlaying && intervalHandle === null) {
                intervalHandle = setInterval(fetchData, fetchInterval);
            } else if (!isPlaying && intervalHandle !== null) {
                clearInterval(intervalHandle);
                intervalHandle = null;
            }
        }

        $('#playButton').click(function() {
            isPlaying = true;
            manageDataFetching();
        });

        $('#pauseButton').click(function() {
            isPlaying = false;
            manageDataFetching();
        });

        $('#randomButton').click(function() {
            next = 1;
            fetchData(code=null, random=true);
        });

        $('#past30Button').click(function() {
            next = -6;
            fetchData();
        });

        $('#next30Button').click(function() {
            next = 6;
            fetchData();
        });

        $('#normalButton').click(function() {
            fetchInterval = 5000; // 1 second refresh rate
            clearInterval(intervalHandle);
            intervalHandle = null;
            manageDataFetching();
        });

        $('#speedUp5Button').click(function() {
            fetchInterval = 1000; // 1 second refresh rate
            clearInterval(intervalHandle);
            intervalHandle = null;
            manageDataFetching();
        });

        $('#speedUp10Button').click(function() {
            fetchInterval = 500; // 0.5 second refresh rate
            clearInterval(intervalHandle);
            intervalHandle = null;
            manageDataFetching();
        });
    });
</script>

</body>
</html>

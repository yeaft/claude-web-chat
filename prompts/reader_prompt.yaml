  3. 实现ChatGPT类似的对话框风格，支持stream返回内容。
  4. 对话上下文最多支持10个对话，超过10个对话后，最早的对话会被删除。同时对话框可以清除所有对话。不会保存用户所有的对话内容。
  5. 当用户用鼠标选择阅读文章的部分内容时，提示用户是否要提问这个问题，如果用户选择是，那么对话框会自动弹出，用户可以直接提问选择内容的问题。
  5. 每个修改的代码给出完整的代码内容。
